name: Paper Trading Rebalance

on:
  schedule:
    - cron: '30 19 * * *'
  push:
    branches:
      - main
  workflow_dispatch: {}

jobs:
  paper-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric pandas numpy networkx scikit-learn xgboost alpaca-py jupyter nbconvert yfinance
      - name: Run Paper Strategy
        env:
          APCA_PAPER_API_KEY_ID: ${{ secrets.APCA_PAPER_API_KEY_ID || secrets.ALPACA_API_KEY }}
          APCA_PAPER_API_SECRET_KEY: ${{ secrets.APCA_PAPER_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY }}
          APCA_PAPER_API_BASE_URL: ${{ secrets.APCA_PAPER_API_BASE_URL }}
        run: |
          jupyter nbconvert --to notebook --execute --inplace "Misc. Files/strategy-paper.ipynb"
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: paper trading logs"
          file_pattern: "."
