name: Alpaca Singularity Rebalance

on:
  push:
    branches:
      - main
  schedule:
    # Run at 14:00 UTC (9:00 AM EST) every weekday
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  rebalance:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy networkx scikit-learn xgboost alpaca-py jupyter nbconvert yfinance

    - name: Run Trading Strategy
      env:
        # Pass all credential variations
        APCA_LIVE_API_KEY_ID: ${{ secrets.APCA_LIVE_API_KEY_ID }}
        APCA_LIVE_API_SECRET_KEY: ${{ secrets.APCA_LIVE_API_SECRET_KEY }}
        APCA_LIVE_API_BASE_URL: ${{ secrets.APCA_LIVE_API_BASE_URL }}
        APCA_PAPER_API_KEY_ID: ${{ secrets.APCA_PAPER_API_KEY_ID }}
        APCA_PAPER_API_SECRET_KEY: ${{ secrets.APCA_PAPER_API_SECRET_KEY }}
        APCA_PAPER_API_BASE_URL: ${{ secrets.APCA_PAPER_API_BASE_URL }}
      run: |
        jupyter nbconvert --to notebook --execute "Misc. Files/reengineered-alpaca-monthly-strategy.ipynb"
        
    - name: Commit execution logs
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "chore: trade execution logs [automated]"
        file_pattern: "*.ipynb"
