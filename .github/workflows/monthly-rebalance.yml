name: Monthly Alpaca Rebalance

on:
  push:
    branches:
      - main
  schedule:
    # Run at 14:00 UTC (9:00 AM EST) every weekday
    - cron: '0 14 * * 1-5'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  rebalance:
    runs-on: ubuntu-latest

    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: https://paper-api.alpaca.markets
      # Change BASE_URL to https://api.alpaca.markets for LIVE trading!

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy networkx scikit-learn xgboost alpaca-py jupyter nbconvert yfinance

    - name: Execute Framework 9 Discovery and Monthly Rebalance
      run: |
        jupyter nbconvert --to notebook --execute "Misc. Files/reengineered-alpaca-monthly-strategy.ipynb"
        
    - name: Commit execution logs and results
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "chore: Automated rebalance execution logs"
        file_pattern: "*.ipynb"
