name: Monthly Alpaca Rebalance

on:
  schedule:
    # Run at 9:00 AM UTC (4:00 AM EST) on the first day of every month
    - cron: '0 9 1 * *'
  workflow_dispatch:
    # Allow manual triggering

jobs:
  rebalance:
    runs-on: ubuntu-latest

    env:
      APCA_API_KEY_ID: ${{ secrets.APCA_API_KEY_ID }}
      APCA_API_SECRET_KEY: ${{ secrets.APCA_API_SECRET_KEY }}
      APCA_API_BASE_URL: https://paper-api.alpaca.markets

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy networkx scikit-learn xgboost alpaca-py

    - name: Execute Framework 9 Discovery and Monthly Rebalance
      run: |
        jupyter nbconvert --to notebook --execute "Misc. Files/reengineered-alpaca-monthly-strategy.ipynb"
        
    - name: Commit execution logs and results
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        commit_message: "chore: Automated monthly rebalance execution logs"
        file_pattern: "*.ipynb"
