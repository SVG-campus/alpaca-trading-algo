name: Live Trading Execution
on:
  schedule:
    - cron: '0 10 * * 1-5' # 10:00 AM EST (Trade Execution)
jobs:
  execute-trade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install alpaca-py yfinance pandas numpy scikit-learn
      - name: Run Live Trading Bot
        env:
          APCA_LIVE_API_KEY_ID: ${{ secrets.APCA_LIVE_API_KEY_ID }}
          APCA_LIVE_API_SECRET_KEY: ${{ secrets.APCA_LIVE_API_SECRET_KEY }}
        run: python3 run_alpaca_live_trade.py