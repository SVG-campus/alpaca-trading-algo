name: Live Trading Rebalance

on:
  schedule:
    # Run only on the 1st of every month
    - cron: '0 14 1 * *'
  workflow_dispatch:

jobs:
  live-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
    - run: |
        python -m pip install --upgrade pip
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        pip install torch_geometric pandas numpy networkx scikit-learn xgboost alpaca-py jupyter nbconvert yfinance
    - name: Run Live Strategy
      env:
        APCA_LIVE_API_KEY_ID: ${{ secrets.APCA_LIVE_API_KEY_ID || secrets.ALPACA_API_KEY }}
        APCA_LIVE_API_SECRET_KEY: ${{ secrets.APCA_LIVE_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY }}
        APCA_LIVE_API_BASE_URL: ${{ secrets.APCA_LIVE_API_BASE_URL }}
        run: |
          jupyter nbconvert --to notebook --execute "Misc. Files/strategy-live.ipynb"
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: live trading logs"
          file_pattern: "*.ipynb"
