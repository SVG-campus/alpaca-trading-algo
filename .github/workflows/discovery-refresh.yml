name: Discovery Refresh

on:
  schedule:
    - cron: '30 22 * * 5'
  workflow_dispatch: {}

jobs:
  discovery-refresh:
    runs-on: ubuntu-latest
    concurrency:
      group: discovery-refresh-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install torch_geometric pandas numpy networkx scikit-learn alpaca-py yfinance
      - name: Run shared discovery cache
        env:
          APCA_PAPER_API_KEY_ID: ${{ secrets.APCA_PAPER_API_KEY_ID || secrets.ALPACA_API_KEY }}
          APCA_PAPER_API_SECRET_KEY: ${{ secrets.APCA_PAPER_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY }}
        run: |
          python run_discovery_cache.py
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: refresh discovery cache"
          file_pattern: "data/latest_discovery.json data/discovery_history.csv"
