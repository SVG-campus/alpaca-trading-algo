name: Automated Causal Discovery Pipeline
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 5 * * 1-5' # 5:00 AM EST M-F
jobs:
  trigger-kaggle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install kaggle alpaca-py yfinance pandas numpy scikit-learn
      - name: Trigger Kaggle GPU Discovery
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          echo "Triggering Kaggle GPU Discovery..."
          python3 scripts/trigger_kaggle_gpu.py