name: MAX Paper Trading Rebalance

on:
  schedule:
    - cron: '35 19 * * *'
  workflow_dispatch: {}

jobs:
  max-paper-trade:
    runs-on: ubuntu-latest
    concurrency:
      group: max-paper-rebalance-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install alpaca-py yfinance pandas
      - name: Run MAX Paper Strategy From Cache
        env:
          MAX_APCA_PAPER_API_KEY_ID: ${{ secrets.MAX_APCA_PAPER_API_KEY_ID || secrets.ALPACA_API_KEY }}
          MAX_APCA_PAPER_API_SECRET_KEY: ${{ secrets.MAX_APCA_PAPER_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY }}
          TRADING_MODE: MAX-PAPER
          DISCOVERY_CACHE_PATH: data/latest_discovery.json
          DISCOVERY_MAX_AGE_DAYS: 10
        run: |
          python run_trade_from_cache.py
      - name: Pull latest logs to avoid race conditions
        run: |
          git config --global pull.rebase true
          git stash || true
          git pull origin main || true
          git stash pop || true
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: MAX paper trading logs"
          file_pattern: "trading_history_logs.csv"
