name: MAX Paper Trading Rebalance

on:
  schedule:
    - cron: '35 19 * * *'
  workflow_dispatch: {}

jobs:
  max-paper-trade:
    runs-on: ubuntu-latest
    concurrency:
      group: max-paper-rebalance-${{ github.ref }}
      cancel-in-progress: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install alpaca-py yfinance pandas
      - name: Run MAX Paper Strategy From Cache
        env:
          MAX_APCA_PAPER_API_KEY_ID: ${{ secrets.MAX_APCA_PAPER_API_KEY_ID || secrets.ALPACA_API_KEY }}
          MAX_APCA_PAPER_API_SECRET_KEY: ${{ secrets.MAX_APCA_PAPER_API_SECRET_KEY || secrets.ALPACA_SECRET_KEY }}
          TRADING_MODE: MAX-PAPER
          DISCOVERY_CACHE_PATH: data/latest_discovery.json
          DISCOVERY_MAX_AGE_DAYS: 10
        run: |
          python run_trade_from_cache.py
      - name: Commit and push logs with retry
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # If the file doesn't exist yet, touching it ensures we can add it
          touch trading_history_logs_max-paper.csv
          git add trading_history_logs_max-paper.csv
          
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          
          git commit -m "chore: MAX paper trading logs"
          
          # Retry loop for race conditions (max 5 attempts)
          for i in {1..5}; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; break; }
            if git push origin HEAD:main; then
              echo "Successfully pushed logs."
              exit 0
            fi
            echo "Push failed due to race condition. Retrying in 5 seconds... (Attempt $i/5)"
            sleep 5
          done
          
          echo "Failed to push logs after 5 attempts."
          exit 1
