name: MAX Paper Trading Rebalance

on:
  schedule:
    # Run only on the 1st of every month at 9:30 AM EST (14:30 UTC)
    - cron: '30 14 1 * *'
    # Force run on Monday morning at 9:30 AM EST (14:30 UTC)
    - cron: '30 14 * * 1'
  workflow_dispatch:

jobs:
  max-paper-trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: |
          python -m pip install --upgrade pip
          pip install pandas numpy networkx scikit-learn xgboost alpaca-py jupyter nbconvert yfinance
      - name: Run MAX Paper Strategy
        env:
          APCA_PAPER_API_KEY_ID: ${{ secrets.MAX_APCA_PAPER_API_KEY_ID }}
          APCA_PAPER_API_SECRET_KEY: ${{ secrets.MAX_APCA_PAPER_API_SECRET_KEY }}
          APCA_PAPER_API_BASE_URL: ${{ secrets.MAX_APCA_PAPER_API_BASE_URL }}
        run: |
          jupyter nbconvert --to notebook --execute "Misc. Files/strategy-max-paper.ipynb"
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: MAX paper trading logs"
          file_pattern: "*.ipynb"
